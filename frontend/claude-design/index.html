<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>NEXUS — Cradle Fund</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --nx-primary: #185FA5;
    --nx-primary-50: #EAF2FB;
    --nx-success: #1D9E75;
    --nx-success-50: #E6F5EF;
    --nx-warning: #BA7517;
    --nx-warning-50: #FBF1E1;
    --nx-danger: #E24B4A;
    --nx-danger-50: #FCEAEA;
    --nx-surface: #F8F8F7;
    --nx-card: #FFFFFF;
    --nx-border: #E0DED8;
    --nx-border-soft: #ECEAE3;
    --nx-text: #1A1A18;
    --nx-text-2: #6B6A65;
    --nx-text-3: #9C9B96;
  }
  html, body { background: var(--nx-surface); color: var(--nx-text); font-family: 'Inter', system-ui, sans-serif; }
  body { font-feature-settings: "cv02", "cv03", "cv04", "cv11"; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d8d6cf; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #c2c0b9; }
  ::-webkit-scrollbar-track { background: transparent; }
  /* Animations */
  @keyframes nx-pop { 0% { opacity:0; transform: translateY(8px) scale(.98);} 100% { opacity:1; transform: translateY(0) scale(1);} }
  @keyframes nx-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes nx-pulse-bar { 0%,100% { opacity:.4 } 50% { opacity: 1 } }
  @keyframes nx-spin { to { transform: rotate(360deg); } }
  @keyframes nx-grow { from { width: 0; } to { width: var(--nx-w, 100%); } }
  @keyframes nx-toast-in { 0% { opacity:0; transform: translateY(20px) scale(.95);} 100% { opacity:1; transform: translateY(0) scale(1);} }
  .nx-pop { animation: nx-pop .35s cubic-bezier(.2,.7,.2,1) both; }
  .nx-fade-in { animation: nx-fade .25s ease both; }
  .nx-grow { animation: nx-grow .9s cubic-bezier(.2,.7,.2,1) both; }
  .nx-toast { animation: nx-toast-in .35s cubic-bezier(.2,.7,.2,1) both; }
  .nx-spin { animation: nx-spin .9s linear infinite; }
  .nx-pulsebar div { animation: nx-pulse-bar 1.1s ease-in-out infinite; }
  .nx-pulsebar div:nth-child(2) { animation-delay: .15s; }
  .nx-pulsebar div:nth-child(3) { animation-delay: .3s; }
  .nx-pulsebar div:nth-child(4) { animation-delay: .45s; }

  /* Focus rings */
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid var(--nx-primary); outline-offset: 2px;
  }
  .nx-card { background: var(--nx-card); border: 1px solid var(--nx-border); border-radius: 12px; }
  .nx-input { background: #fff; border: 1px solid var(--nx-border); border-radius: 8px; padding: 10px 12px; font-size: 14px; }
  .nx-input:focus { border-color: var(--nx-primary); outline: none; box-shadow: 0 0 0 3px rgba(24,95,165,.12); }
  .nx-btn-primary { background: var(--nx-primary); color: #fff; border-radius: 8px; padding: 10px 14px; font-weight: 500; font-size: 14px; transition: background .15s ease, transform .05s ease; }
  .nx-btn-primary:hover { background: #14528f; }
  .nx-btn-primary:active { transform: translateY(1px); }
  .nx-btn-primary:disabled { opacity: .65; cursor: not-allowed; }
  .nx-btn-outline { background: #fff; color: var(--nx-text); border: 1px solid var(--nx-border); border-radius: 8px; padding: 10px 14px; font-weight: 500; font-size: 14px; transition: background .15s; }
  .nx-btn-outline:hover { background: #f3f1ec; }
  .nx-btn-success { background: var(--nx-success); color: #fff; border-radius: 8px; padding: 10px 14px; font-weight: 500; font-size: 14px; }
  .nx-btn-success:hover { background: #168a64; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens/intake.jsx"></script>
<script type="text/babel" src="screens/matching.jsx"></script>
<script type="text/babel" src="screens/close_programme_modal.jsx"></script>
<script type="text/babel" src="screens/pipeline.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/graph.jsx"></script>
<script type="text/babel" src="screens/flywheel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
